; extensions_custom.conf
; Contextos base — não editar manualmente.
; Centrais, rotas de tronco e URAs são gerenciados pelo EDACall via backend.

; ─── Inter-ramais e outbound ─────────────────────────────────────────────────
[local-ramais]

; ── Gravador de áudio para URA (disque *77) ──────────────────────────────────
exten => *77,1,NoOp(Gravador de áudio para URA — ramal ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Set(REC_NAME=gravacao-${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)})
 same => n(grava),Playback(beep)
 same => n,Record(custom/${REC_NAME}.wav,3,120,k)
 same => n,Playback(beep)
 same => n,Playback(custom/${REC_NAME})
 same => n,Read(REC_OPCAO,,1,,1,5)
 same => n,GotoIf($["${REC_OPCAO}" = "1"]?fim)
 same => n,GotoIf($["${REC_OPCAO}" = "2"]?grava)
 same => n,System(rm -f /var/lib/asterisk/sounds/custom/${REC_NAME}.wav)
 same => n,Hangup()
 same => n(fim),NoOp(Gravação salva: ${REC_NAME}.wav)
 same => n,Hangup()

exten => _XXXX,1,NoOp(Chamada local para ${EXTEN})
 same => n,Set(RECFILE=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID}-${CALLERID(num)}-${EXTEN}.wav)
 same => n,MixMonitor(${RECFILE},b)
 same => n,Dial(SIP/${EXTEN},20)
 same => n,Hangup()

; ── Saída externa Brasil ──────────────────────────────────────────────────────
; 8 dígitos  — fixo local sem DDD         (ex: 33221234)
; 9 dígitos  — celular local sem DDD      (ex: 991234567)
; 10 dígitos — DDD (2) + fixo (8)         (ex: 1133221234)
; 11 dígitos — DDD (2) + celular (9)      (ex: 11991234567)
;
; O ramal deve ter uma linha VoIP vinculada (VOIPLINE=nome_tronco).
; Sem VOIPLINE configurada, a chamada toca sinal de ocupado.

exten => _XXXXXXXX,1,NoOp(Saída Brasil: ${EXTEN} via ${VOIPLINE})
 same => n,GotoIf($["${VOIPLINE}" = ""]?sem_tronco)
 same => n,Dial(SIP/${VOIPLINE}/${EXTEN},60)
 same => n,Hangup()
 same => n(sem_tronco),NoOp(Ramal sem VoIP vinculado)
 same => n,Playback(all-circuits-busy-now)
 same => n,Hangup()

exten => _XXXXXXXXX,1,NoOp(Saída Brasil: ${EXTEN} via ${VOIPLINE})
 same => n,GotoIf($["${VOIPLINE}" = ""]?sem_tronco)
 same => n,Dial(SIP/${VOIPLINE}/${EXTEN},60)
 same => n,Hangup()
 same => n(sem_tronco),NoOp(Ramal sem VoIP vinculado)
 same => n,Playback(all-circuits-busy-now)
 same => n,Hangup()

exten => _XXXXXXXXXX,1,NoOp(Saída Brasil: ${EXTEN} via ${VOIPLINE})
 same => n,GotoIf($["${VOIPLINE}" = ""]?sem_tronco)
 same => n,Dial(SIP/${VOIPLINE}/${EXTEN},60)
 same => n,Hangup()
 same => n(sem_tronco),NoOp(Ramal sem VoIP vinculado)
 same => n,Playback(all-circuits-busy-now)
 same => n,Hangup()

exten => _XXXXXXXXXXX,1,NoOp(Saída Brasil: ${EXTEN} via ${VOIPLINE})
 same => n,GotoIf($["${VOIPLINE}" = ""]?sem_tronco)
 same => n,Dial(SIP/${VOIPLINE}/${EXTEN},60)
 same => n,Hangup()
 same => n(sem_tronco),NoOp(Ramal sem VoIP vinculado)
 same => n,Playback(all-circuits-busy-now)
 same => n,Hangup()

; ─── ChanSpy para supervisor ─────────────────────────────────────────────────
; Chamado via AMI Originate — não incluir em contextos de ramais
[chanspy-supervisor]
exten => _X.,1,NoOp(Supervisor monitorando SIP/${EXTEN} modo ${SPY_MODE})
 same => n,Answer()
 same => n,Wait(1)
 same => n,ChanSpy(SIP/${EXTEN},${SPY_MODE})
 same => n,Hangup()

; ─── Contexto padrão para ramais sem linha VoIP ──────────────────────────────
[default]
include => local-ramais
include => ura-reversa
include => inbound-did-routes

; ─── URA Reversa (campanhas de saída) ────────────────────────────────────────
[ura-reversa]
exten => s,1,NoOp(URA reversa iniciada para ${APP_PHONE})
 same => n,Set(URA_REF=${IF($["${APP_URA_REF}"=""]?${UNIQUEID}:${APP_URA_REF})})
 same => n,Set(DEFAULT_TARGET=${IF($["${APP_TARGET_EXTEN}"=""]?2001:${APP_TARGET_EXTEN})})
 same => n,Set(TRANSFER_TECH=SIP)
 same => n,Set(MENU_PROMPT=${IF($["${APP_URA_PROMPT}"=""]?custom/edacall-menu-ptbr:${APP_URA_PROMPT})})
 same => n,Set(DIGIT_TIMEOUT=${IF($["${APP_DIGIT_TIMEOUT}"=""]?5:${APP_DIGIT_TIMEOUT})})
 same => n,Set(RECFILE=ura-${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${URA_REF}.wav)
 same => n,MixMonitor(${RECFILE},b)
 same => n,Answer()
 same => n,Playback(${MENU_PROMPT})
 same => n,Read(URACHOICE,${MENU_PROMPT},1,,1,${DIGIT_TIMEOUT})
 same => n,GotoIf($["${URACHOICE}"="0"]?handle)
 same => n,GotoIf($["${URACHOICE}"="1"]?handle)
 same => n,GotoIf($["${URACHOICE}"="2"]?handle)
 same => n,GotoIf($["${URACHOICE}"="3"]?handle)
 same => n,GotoIf($["${URACHOICE}"="4"]?handle)
 same => n,GotoIf($["${URACHOICE}"="5"]?handle)
 same => n,GotoIf($["${URACHOICE}"="6"]?handle)
 same => n,GotoIf($["${URACHOICE}"="7"]?handle)
 same => n,GotoIf($["${URACHOICE}"="8"]?handle)
 same => n,GotoIf($["${URACHOICE}"="9"]?handle)
 same => n,Goto(invalid)

 same => n(handle),NoOp(URA opção ${URACHOICE})
 same => n,Set(CHOSEN_ACTION=hangup)
 same => n,Set(CHOSEN_TARGET=${DEFAULT_TARGET})
 same => n,ExecIf($["${URACHOICE}"="0"]?Set(CHOSEN_ACTION=${APP_ACT_0}))
 same => n,ExecIf($["${URACHOICE}"="1"]?Set(CHOSEN_ACTION=${APP_ACT_1}))
 same => n,ExecIf($["${URACHOICE}"="2"]?Set(CHOSEN_ACTION=${APP_ACT_2}))
 same => n,ExecIf($["${URACHOICE}"="3"]?Set(CHOSEN_ACTION=${APP_ACT_3}))
 same => n,ExecIf($["${URACHOICE}"="4"]?Set(CHOSEN_ACTION=${APP_ACT_4}))
 same => n,ExecIf($["${URACHOICE}"="5"]?Set(CHOSEN_ACTION=${APP_ACT_5}))
 same => n,ExecIf($["${URACHOICE}"="6"]?Set(CHOSEN_ACTION=${APP_ACT_6}))
 same => n,ExecIf($["${URACHOICE}"="7"]?Set(CHOSEN_ACTION=${APP_ACT_7}))
 same => n,ExecIf($["${URACHOICE}"="8"]?Set(CHOSEN_ACTION=${APP_ACT_8}))
 same => n,ExecIf($["${URACHOICE}"="9"]?Set(CHOSEN_ACTION=${APP_ACT_9}))
 same => n,ExecIf($["${URACHOICE}"="0"]?Set(CHOSEN_TARGET=${APP_TGT_0}))
 same => n,ExecIf($["${URACHOICE}"="1"]?Set(CHOSEN_TARGET=${APP_TGT_1}))
 same => n,ExecIf($["${URACHOICE}"="2"]?Set(CHOSEN_TARGET=${APP_TGT_2}))
 same => n,ExecIf($["${URACHOICE}"="3"]?Set(CHOSEN_TARGET=${APP_TGT_3}))
 same => n,ExecIf($["${URACHOICE}"="4"]?Set(CHOSEN_TARGET=${APP_TGT_4}))
 same => n,ExecIf($["${URACHOICE}"="5"]?Set(CHOSEN_TARGET=${APP_TGT_5}))
 same => n,ExecIf($["${URACHOICE}"="6"]?Set(CHOSEN_TARGET=${APP_TGT_6}))
 same => n,ExecIf($["${URACHOICE}"="7"]?Set(CHOSEN_TARGET=${APP_TGT_7}))
 same => n,ExecIf($["${URACHOICE}"="8"]?Set(CHOSEN_TARGET=${APP_TGT_8}))
 same => n,ExecIf($["${URACHOICE}"="9"]?Set(CHOSEN_TARGET=${APP_TGT_9}))
 same => n,ExecIf($["${CHOSEN_TARGET}"=""]?Set(CHOSEN_TARGET=${DEFAULT_TARGET}))
 same => n,System(curl -s -X POST -H "Content-Type: application/json" -d "{\"uraRef\":\"${URA_REF}\",\"campaignId\":\"${APP_CAMPAIGN_ID}\",\"extensionId\":\"${APP_EXTENSION_ID}\",\"uraCampaignId\":\"${APP_URA_CAMPAIGN_ID}\",\"uraContactId\":\"${APP_URA_CONTACT_ID}\",\"phoneNumber\":\"${APP_PHONE}\",\"selectedOption\":\"${URACHOICE}\",\"audioPath\":\"/recordings/${RECFILE}\",\"result\":\"opcao_${URACHOICE}\"}" ${URA_CALLBACK_URL} >/dev/null 2>&1)
 same => n,GotoIf($["${CHOSEN_ACTION}"="transfer_extension"]?do_transfer)
 same => n,GotoIf($["${CHOSEN_ACTION}"="speak_commercial"]?do_commercial)
 same => n,Hangup()

 same => n(do_transfer),Dial(${TRANSFER_TECH}/${CHOSEN_TARGET},20)
 same => n,Hangup()

 same => n(do_commercial),Dial(${TRANSFER_TECH}/2000,20)
 same => n,Hangup()

 same => n(invalid),NoOp(URA opção inválida/timeout)
 same => n,System(curl -s -X POST -H "Content-Type: application/json" -d "{\"uraRef\":\"${URA_REF}\",\"campaignId\":\"${APP_CAMPAIGN_ID}\",\"extensionId\":\"${APP_EXTENSION_ID}\",\"uraCampaignId\":\"${APP_URA_CAMPAIGN_ID}\",\"uraContactId\":\"${APP_URA_CONTACT_ID}\",\"phoneNumber\":\"${APP_PHONE}\",\"selectedOption\":\"invalid\",\"audioPath\":\"/recordings/${RECFILE}\",\"result\":\"sem_opcao\"}" ${URA_CALLBACK_URL} >/dev/null 2>&1)
 same => n,Playback(custom/edacall-opcao-invalida-ptbr)
 same => n,Hangup()

; ─── Contexto para ramais com linha VoIP (outbound habilitado) ───────────────
; Trunk contexts são gerados dinamicamente pelo EDACall.
; Não deixe um contexto fixo como [tronco] aqui, pois o nome do tronco pode variar.
