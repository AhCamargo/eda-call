; pjsip_base.conf — configuração estática PJSIP (transports + templates)
; Carregado pelo entrypoint como /etc/asterisk/pjsip.conf
; Os endpoints dinâmicos ficam em pjsip_custom.conf (gerado pelo backend)

[global]
type=global
user_agent=EdaCall-PBX

; ─────────────────────────────────────────────────────────
; Transporte WebSocket (plain WS) para clientes WebRTC no browser
; Para produção com HTTPS, trocar protocol=ws por wss e adicionar
; cert_file e privkey_file
; ─────────────────────────────────────────────────────────
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

; ─────────────────────────────────────────────────────────
; Templates — herdados pelos endpoints dinâmicos
; ─────────────────────────────────────────────────────────
[webrtc-endpoint](!)
type=endpoint
transport=transport-ws
context=default
disallow=all
allow=opus
allow=ulaw
allow=alaw
; webrtc=yes habilita: use_avpf, ice_support, dtls, rtcp_mux, bundle
webrtc=yes
dtls_auto_generate_cert=yes
rtp_symmetric=yes
rewrite_contact=yes

[webrtc-auth](!)
type=auth
auth_type=userpass

[webrtc-aor](!)
type=aor
max_contacts=2
remove_existing=yes
qualify_frequency=30

; ─────────────────────────────────────────────────────────
; Include dos endpoints gerados pelo backend
; ─────────────────────────────────────────────────────────
#include /etc/asterisk-custom/pjsip_custom.conf
