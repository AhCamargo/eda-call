; BEGIN EDACALL sip-extension:C1-1051
[C1-1051]
type=friend
host=dynamic
secret=1234
context=default
disallow=all
allow=g729
allow=ulaw
allow=alaw
dtmfmode=rfc2833
nat=force_rport,comedia
directmedia=no
qualify=yes
qualifyfreq=30
; END EDACALL sip-extension:C1-1051

