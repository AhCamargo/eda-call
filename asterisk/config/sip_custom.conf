; BEGIN EDACALL sip-voip-line:Extreme-Voip
[Extreme-Voip]
type=peer
host=0.0.0.0
port=5060
username=xtcoip
fromuser=xtcoip
secret=1203
context=Extreme-Voip
disallow=all
allow=ulaw
allow=alaw
insecure=invite,port
qualify=yes
; END EDACALL sip-voip-line:Extreme-Voip

