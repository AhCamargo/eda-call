[asterisk-edacall]
enabled  = true
filter   = asterisk-edacall
logpath  = /opt/edacall/asterisk/logs/messages
maxretry = 5
findtime = 300
bantime  = 3600

# DOCKER-USER chain é necessário para bloquear IPs que chegam em containers Docker.
# O chain INPUT padrão não intercepta tráfego encaminhado pelo Docker.
action = iptables-allports[name=asterisk, chain=DOCKER-USER, protocol=all]
