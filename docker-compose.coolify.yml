services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile.prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AMI_USERNAME: ${AMI_USERNAME}
      AMI_PASSWORD: ${AMI_PASSWORD}
    expose:
      - "5038"
      - "5060/udp"
    volumes:
      - asterisk_config:/etc/asterisk-custom
      - asterisk_recordings:/var/spool/asterisk/monitor
      - asterisk_sounds:/var/lib/asterisk/sounds/custom
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    depends_on:
      postgres:
        condition: service_healthy
      asterisk:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      BACKEND_INTERNAL_URL: http://backend:5000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      AMI_HOST: asterisk
      AMI_PORT: 5038
      AMI_USERNAME: ${AMI_USERNAME}
      AMI_PASSWORD: ${AMI_PASSWORD}
      ASTERISK_SIP_CUSTOM_FILE: /asterisk-config/sip_custom.conf
      ASTERISK_PJSIP_CUSTOM_FILE: /asterisk-config/pjsip_custom.conf
      ASTERISK_RECORDINGS_DIR: /asterisk-recordings
      ASTERISK_SOUNDS_DIR: /asterisk-sounds
    expose:
      - "5000"
    volumes:
      - asterisk_config:/asterisk-config
      - asterisk_recordings:/asterisk-recordings
      - asterisk_sounds:/asterisk-sounds
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    expose:
      - "5173"
    restart: unless-stopped

volumes:
  postgres_data:
  asterisk_config:
  asterisk_recordings:
  asterisk_sounds:
