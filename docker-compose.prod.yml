services:
  postgres:
    image: postgres:16-alpine
    container_name: edacall_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edacall}
      POSTGRES_USER: ${POSTGRES_USER:-edacall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edacall}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile.prod
    container_name: edacall_asterisk
    ports:
      - "5038:5038"
      - "5060:5060/udp"
      - "10000-10099:10000-10099/udp"
    environment:
      ASTERISK_EXTERN_IP: ${ASTERISK_EXTERN_IP}
      ASTERISK_EFIX_REGISTER: ${ASTERISK_EFIX_REGISTER:-}
    volumes:
      - asterisk_config:/etc/asterisk-custom
      - asterisk_recordings:/var/spool/asterisk/monitor
      - asterisk_sounds:/var/lib/asterisk/sounds/custom
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: edacall_backend
    depends_on:
      postgres:
        condition: service_healthy
      asterisk:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-edacall}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-edacall}
      JWT_SECRET: ${JWT_SECRET}
      AMI_HOST: asterisk
      AMI_PORT: 5038
      AMI_USERNAME: ${AMI_USERNAME:-admin}
      AMI_PASSWORD: ${AMI_PASSWORD}
      ASTERISK_SIP_CUSTOM_FILE: /etc/asterisk-custom/sip_custom.conf
      ASTERISK_EXTENSIONS_CUSTOM_FILE: /etc/asterisk-custom/extensions_custom.conf
      ASTERISK_QUEUES_CUSTOM_FILE: /etc/asterisk-custom/queues_custom.conf
      ASTERISK_RECORDINGS_DIR: /asterisk-recordings
      ASTERISK_SOUNDS_DIR: /asterisk-sounds
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "5000:5000"
    volumes:
      - asterisk_config:/etc/asterisk-custom
      - asterisk_recordings:/asterisk-recordings
      - asterisk_sounds:/asterisk-sounds
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: edacall_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
  asterisk_config:
  asterisk_recordings:
  asterisk_sounds:
