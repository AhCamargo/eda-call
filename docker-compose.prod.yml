services:
  postgres:
    image: postgres:16-alpine
    container_name: edacall_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edacall}
      POSTGRES_USER: ${POSTGRES_USER:-edacall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edacall}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: edacall_backend
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-edacall}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-edacall}
      JWT_SECRET: ${JWT_SECRET}
      AMI_HOST: host.docker.internal
      AMI_PORT: 5038
      AMI_USERNAME: ${AMI_USERNAME:-admin}
      AMI_PASSWORD: ${AMI_PASSWORD}
      ASTERISK_SIP_CUSTOM_FILE: /etc/asterisk-custom/sip_custom.conf
      ASTERISK_EXTENSIONS_CUSTOM_FILE: /etc/asterisk-custom/extensions_custom.conf
      ASTERISK_QUEUES_CUSTOM_FILE: /etc/asterisk-custom/queues_custom.conf
      ASTERISK_RECORDINGS_DIR: /asterisk-recordings
      ASTERISK_SOUNDS_DIR: /asterisk-sounds
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "5000:5000"
    volumes:
      - /etc/asterisk-custom:/etc/asterisk-custom
      - /var/spool/asterisk/monitor:/asterisk-recordings
      - /var/lib/asterisk/sounds/custom:/asterisk-sounds
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: edacall_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
