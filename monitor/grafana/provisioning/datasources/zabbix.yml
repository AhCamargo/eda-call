apiVersion: 1

datasources:
  - name: Zabbix
    type: alexanderzobnin-zabbix-datasource
    uid: zabbix-main
    access: proxy
    orgId: 1
    isDefault: true
    jsonData:
      # URL interna do Zabbix Web (dentro da rede Docker)
      url: http://zabbix-web:8080/api_jsonrpc.php
      username: Admin
      trends: true
      trendsFrom: "7d"
      trendsRange: "4d"
      cacheTtl: "1m"
      alerting: true
      addThresholds: false
      alertingMinSeverity: 3
    secureJsonData:
      # Senha do usuário Admin do Zabbix
      # Mude aqui se alterar a senha padrão no Zabbix
      password: zabbix
    version: 1
    editable: true
