# ═══════════════════════════════════════════════════════════════════════════════
#  EdaCall — Zabbix UserParameter Configuration
#  Instalar em: /etc/zabbix/zabbix_agent2.d/userparameter_edacall.conf
#  (ou /etc/zabbix/zabbix_agentd.d/ se usar o agente 1.x)
#
#  Após instalar, reiniciar o agente:
#    sudo systemctl restart zabbix-agent2
# ═══════════════════════════════════════════════════════════════════════════════

# Status geral da licença (1 = válida, 0 = inválida/expirada)
UserParameter=edacall.license.valid,/usr/local/bin/edacall-license-status --field valid

# Dias restantes até expirar (-1 = API indisponível, null = vitalício)
UserParameter=edacall.license.days_remaining,/usr/local/bin/edacall-license-status --field days_remaining

# Nome do cliente (para inventário no Zabbix)
UserParameter=edacall.license.client_name,/usr/local/bin/edacall-license-status --field client_name

# ID do cliente
UserParameter=edacall.license.client_id,/usr/local/bin/edacall-license-status --field client_id

# Data de expiração (ISO 8601)
UserParameter=edacall.license.expires_at,/usr/local/bin/edacall-license-status --field expires_at

# Máximo de ramais (0 = ilimitado)
UserParameter=edacall.license.max_extensions,/usr/local/bin/edacall-license-status --field max_extensions

# Licença expirada? (true/false)
UserParameter=edacall.license.expired,/usr/local/bin/edacall-license-status --field expired

# Mensagem de erro (vazia se válida)
UserParameter=edacall.license.error,/usr/local/bin/edacall-license-status --field error

# JSON completo (para item de discovery ou debug)
UserParameter=edacall.license.json,/usr/local/bin/edacall-license-status
